# Use 256 colors and advertise true-color support for modern terminals.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB:extkeys"

# Pass modified keys through to TUIs such as Codex and Claude.
set -g extended-keys on
set -g extended-keys-format csi-u

# Set prefix to C-s
set -g prefix C-s
unbind C-a
unbind C-b
bind C-s send-prefix

# Keep command history available for long-running sessions.
set -g history-limit 50000

# Improve responsiveness in Vim and shell key sequences.
set -sg escape-time 10

# Enable mouse selection, pane resizing, and scrolling.
set -g mouse on

# Reload this file quickly while tuning settings.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Pane history after prefix.
bind p copy-mode -eu
bind -n C-v paste-buffer

# Pane splitting after prefix.
bind [ split-window -h -c "#{pane_current_path}"
bind ] split-window -v -c "#{pane_current_path}"

# Prefix-less pseudo zoom: large current pane with other panes stacked at right.
bind -n C-o run-shell -b "$HOME/Documents/git/dotfiles/scripts/tmux_sidebar_zoom.sh '#{pane_id}'"

# Make the active pane stand out using the same accent as prefix mode.
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour31"

# Vim-like pane navigation after prefix.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Window navigation after prefix.
bind -r u next-window
bind -r i previous-window
bind -r U swap-window -t :+1
bind -r I swap-window -t :-1
bind -n C-q choose-tree -Zw

# Sensible status line.
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "#{?client_prefix,bg=colour31,bg=colour235},fg=colour250"
set -g status-left "#[bold]#S #[fg=#{?client_prefix,colour195,colour244}]| #[fg=#{?client_prefix,colour231,colour39}]W:#I:#W P:#P #[default]"
set -g status-right "#[fg=#{?client_prefix,colour231,colour244}]%Y-%m-%d %H:%M"
setw -g window-status-current-format "#[bold,fg=#{?client_prefix,colour231,colour255}] #I:#W "
setw -g window-status-format "#[fg=#{?client_prefix,colour153,colour250}] #I:#W "
