# Use 256 colors and advertise true-color support for modern terminals.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Set prefix to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Bindings
bind [ split-window -h -c "#{pane_current_path}"
bind ] split-window -v -c "#{pane_current_path}"

# Keep command history available for long-running sessions.
set -g history-limit 50000

# Make indexes line up with common window/tab numbering.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Improve responsiveness in Vim and shell key sequences.
set -sg escape-time 10

# Enable mouse selection, pane resizing, and scrolling.
set -g mouse on

# Reload this file quickly while tuning settings.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Easier pane splitting in the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-like pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like copy mode.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Sensible status line.
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[bold]#S #[default]"
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M"
setw -g window-status-current-format "#[bold] #I:#W "
setw -g window-status-format " #I:#W "
